; PlatformIO – Rotor_Firmware (ESP32-S3 N8R8, Arduino)
; Bibliotheken unter lib/ (für Git/offline wie Rotor_Display_5)

[platformio]
default_envs = esp32-s3-n8r8

[env:esp32-s3-n8r8]
platform = espressif32
; ESP32-S3-DevKitC-1: 8 MB Flash (Quad), 8 MB PSRAM (Octal) – „N8R8“
board = esp32-s3-devkitc-1
framework = arduino

; Board-Spezifikationen überschreiben für N8R8 (8MB Flash, 8MB PSRAM)
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = default_8MB.csv
board_build.arduino.memory_type = qio_qspi

upload_speed = 921600
; Fest auf COM15 (mehrere serielle Geraete am Rechner)
upload_port = COM15
monitor_speed = 115200
monitor_port = COM15
; Bei ESP32-S3 + USB-CDC: verhindert Reset beim Öffnen des Serial-Monitors
monitor_rts = 0
monitor_dtr = 0

; Native USB (CDC): Debug auf USB-Serial; Upload weiter per esptool (COM-Port)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
